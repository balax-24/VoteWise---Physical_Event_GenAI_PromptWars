server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/html application/javascript application/json image/svg+xml;

    # ── Security headers ─────────────────────────
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'self'; script-src 'self' https://translate.google.com https://www.googletagmanager.com https://www.google.com/maps; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com https://translate.google.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://generativelanguage.googleapis.com https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://translate.googleapis.com https://translate-pa.googleapis.com; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "0" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ETag support (explicit)
    etag on;

    # React Router — serve index.html for all routes (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (they have content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'self'; script-src 'self' https://translate.google.com https://www.googletagmanager.com https://www.google.com/maps; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com https://translate.google.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://generativelanguage.googleapis.com https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://translate.googleapis.com https://translate-pa.googleapis.com; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection "0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # Don't cache the HTML itself
    location = /index.html {
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; frame-ancestors 'self'; script-src 'self' https://translate.google.com https://www.googletagmanager.com https://www.google.com/maps; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://www.google.com https://translate.google.com; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://generativelanguage.googleapis.com https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://translate.googleapis.com https://translate-pa.googleapis.com; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-XSS-Protection "0" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
